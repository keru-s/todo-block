name: Build and Release

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

env:
  APP_NAME: todo block
  PROJECT: todo block.xcodeproj
  SCHEME: todo block

jobs:
  build:
    name: Build
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Release
        run: |
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO

  release:
    name: Package Release
    runs-on: macos-26
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Release app
        run: |
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Ad-hoc sign with sandbox entitlement
        run: |
          set -euo pipefail
          APP="build/DerivedData/Build/Products/Release/$APP_NAME.app"
          ENTITLEMENTS="$RUNNER_TEMP/todo-block.entitlements"
          cat > "$ENTITLEMENTS" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.app-sandbox</key>
              <true/>
          </dict>
          </plist>
          PLIST
          codesign --force --deep \
            --identifier "com.insight.to-do-block" \
            --entitlements "$ENTITLEMENTS" \
            --sign - "$APP"
          echo "=== Signature ==="
          codesign -dvvv "$APP"
          echo "=== Entitlements ==="
          codesign -d --entitlements - "$APP" || true

      - name: Package app as DMG
        run: |
          set -euo pipefail
          mkdir -p release
          STAGING="$RUNNER_TEMP/dmg-staging"
          mkdir -p "$STAGING"
          cp -R "build/DerivedData/Build/Products/Release/$APP_NAME.app" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "Todo Block" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "release/Todo-Block-macOS.dmg"

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: Todo-Block-macOS
          path: release/Todo-Block-macOS.dmg

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/Todo-Block-macOS.dmg
