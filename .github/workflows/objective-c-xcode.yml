name: Build and Release

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

env:
  APP_NAME: todo block
  PROJECT: todo block.xcodeproj
  SCHEME: todo block

jobs:
  build:
    name: Build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Release
        run: |
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO

  release:
    name: Package Release
    runs-on: macos-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Release app
        run: |
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Package app
        run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent \
            "build/DerivedData/Build/Products/Release/$APP_NAME.app" \
            "release/Todo-Block-macOS.zip"

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: Todo-Block-macOS
          path: release/Todo-Block-macOS.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/Todo-Block-macOS.zip
